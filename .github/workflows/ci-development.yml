name: CI - Development

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache de Dependencias
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}

      - name: Instalar dependencias
        run: npm install

      - name: Rodar lint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache de Dependencias
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-24-${{ hashFiles('**/package-lock.json') }}

      - name: Instalar dependencias
        run: npm install

      - name: Gerar artefato
        run: zip -r app.zip .

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: app.zip

  test:
    needs: build
    strategy:
      matrix:
        node-version: [20, 22, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v4
        with:
          name: app-build

      - name: Extrair artefato
        shell: pwsh
        run: Expand-Archive -Path app.zip -DestinationPath . -Force

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache de Dependencias
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}

      - name: Instalar dependencias
        run: npm install

      - name: Rodar testes
        run: npm test

      - name: Run Coverage
        run: npm run coverage

  sonar:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache de Dependencias
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-24-${{ hashFiles('**/package-lock.json') }}

      - name: Instalar dependencias
        run: npm install

      - name: Gerar coverage
        run: npm run coverage

      - name: Analise com SonarCloud
        uses: SonarSource/sonarcloud-github-action@e44258b109568baa0df60ed515909fc6c72cba92
        with:
          args: >
            -Dsonar.projectKey=AllanAleson_aulapipiline2
            -Dsonar.organization=allanaleson
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
